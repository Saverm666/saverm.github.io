<script>
  document.addEventListener('DOMContentLoaded', function() {
    const CONFIG = {"enable":true,"clickThreshold":5,"newBioText":"Hexe","newNameText":"OktaviavonSeckendorff","themeColor":"#e74c3c","newAvatarPath":"/images/avatar_witch.png","fadeDuration":200,"bgmPath":"/audio/majo_bgm.m4a","voicePath":"/audio/sayaka_baka.mp3","bgmVolume":0.2,"voiceVolume":0.8,"typewriterText":"我，真是个笨蛋","typeRhythm":[800,1200,250,250,550,250,250],"shatterDelay":2000,"shatterDistance":150};
    if (!CONFIG.enable) return;

    const elements = {
      pageRoot: document.querySelector('.about-page'),
      triggerBtn: document.getElementById('easter-egg-btn'),
      nameLabel: document.getElementById('about-name'),
      avatarImg: document.querySelector('.about-avatar-wrap img'),
      overlay: document.getElementById('typewriter-overlay'),
      textContainer: document.getElementById('typewriter-text')
    };

    if (!elements.triggerBtn || !elements.nameLabel || !elements.avatarImg || !elements.overlay || !elements.textContainer) {
      return;
    }

    document.body.appendChild(elements.overlay);

    let clickCount = 0;
    let isEggActivating = false;
    let isEvilModeActive = false;
    let preloadedAssetsPromise = null;
    let bgmInstance = null;
    let voiceInstance = null;

    elements.triggerBtn.addEventListener('click', handleEggClick);

    function handleEggClick() {
      if (isEggActivating || isEvilModeActive) return;
      if (clickCount >= CONFIG.clickThreshold) return;
      clickCount += 1;
      if (clickCount === CONFIG.clickThreshold) {
        triggerEvilMode();
      }
    }

    async function triggerEvilMode() {
      if (isEggActivating || isEvilModeActive) return;
      isEggActivating = true;
      elements.triggerBtn.classList.add('is-loading');

      let assets;
      try {
        assets = await prepareEvilModeAssets();
      } catch (error) {
        console.warn('[About Egg] Failed to preload easter egg assets:', error);
        isEggActivating = false;
        clickCount = Math.max(0, CONFIG.clickThreshold - 1);
        elements.triggerBtn.classList.remove('is-loading');
        return;
      }

      if (elements.pageRoot) {
        elements.pageRoot.classList.add('about-evil-mode');
      }

      elements.nameLabel.textContent = CONFIG.newNameText;
      elements.nameLabel.classList.add('witch-mode-text');
      document.documentElement.style.setProperty('--about-primary-color', CONFIG.themeColor);

      const bioWrap = elements.triggerBtn.parentElement;
      if (bioWrap) {
        bioWrap.textContent = CONFIG.newBioText;
        bioWrap.classList.add('witch-mode-text');
      }

      await fadeAvatar(assets.avatarImage);
      playAudio(assets);
      isEggActivating = false;
      isEvilModeActive = true;
      elements.triggerBtn.classList.remove('is-loading');
      startTypewriterEffect();
    }

    function prepareEvilModeAssets() {
      if (preloadedAssetsPromise) return preloadedAssetsPromise;

      preloadedAssetsPromise = Promise.all([
        preloadImage(CONFIG.newAvatarPath),
        preloadAudio(CONFIG.bgmPath, {
          volume: CONFIG.bgmVolume,
          loop: true
        }),
        preloadAudio(CONFIG.voicePath, {
          volume: CONFIG.voiceVolume,
          loop: false
        }),
        preloadWitchFonts()
      ]).then(([avatarImage, bgmAudio, voiceAudio]) => ({
        avatarImage,
        bgmAudio,
        voiceAudio
      })).catch((error) => {
        preloadedAssetsPromise = null;
        throw error;
      });

      return preloadedAssetsPromise;
    }

    function fadeAvatar(avatarImage) {
      return new Promise((resolve) => {
        elements.avatarImg.style.opacity = '0';
        setTimeout(() => {
          elements.avatarImg.src = avatarImage && avatarImage.src ? avatarImage.src : CONFIG.newAvatarPath;
          requestAnimationFrame(() => {
            elements.avatarImg.style.opacity = '1';
            resolve();
          });
        }, CONFIG.fadeDuration);
      });
    }

    function playAudio(assets) {
      if (bgmInstance) {
        bgmInstance.pause();
      }
      if (voiceInstance) {
        voiceInstance.pause();
      }

      bgmInstance = assets.bgmAudio;
      voiceInstance = assets.voiceAudio;

      bgmInstance.currentTime = 0;
      voiceInstance.currentTime = 0;

      Promise.allSettled([
        bgmInstance.play(),
        voiceInstance.play()
      ]).catch(() => {});
    }

    async function startTypewriterEffect() {
      const text = CONFIG.typewriterText;
      const rhythm = CONFIG.typeRhythm;

      elements.textContainer.style.opacity = '1';
      elements.textContainer.innerHTML = '';

      for (let i = 0; i < text.length; i += 1) {
        elements.textContainer.innerHTML = text.slice(0, i + 1) + '<span class="cursor-blink"></span>';
        await sleep(rhythm[i] || 500);
      }

      elements.textContainer.innerHTML = text;
      await sleep(CONFIG.shatterDelay);
      shatterText();
    }

    function shatterText() {
      const chars = CONFIG.typewriterText.split('');
      elements.textContainer.innerHTML = chars.map((char) => '<span class="char-shard">' + char + '</span>').join('');

      const shards = elements.textContainer.querySelectorAll('.char-shard');
      shards.forEach((shard) => {
        const angle = Math.random() * Math.PI * 2;
        const distance = Math.random() * CONFIG.shatterDistance;
        const x = Math.cos(angle) * distance;
        const y = Math.sin(angle) * distance;
        const rotate = (Math.random() - 0.5) * 720;

        requestAnimationFrame(() => {
          shard.style.transform = 'translate(' + x + 'px, ' + y + 'px) rotate(' + rotate + 'deg)';
          shard.style.opacity = '0';
          shard.style.filter = 'blur(4px)';
        });
      });
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function preloadImage(src) {
      return new Promise((resolve, reject) => {
        const image = new Image();
        image.onload = () => resolve(image);
        image.onerror = () => reject(new Error('Failed to load image: ' + src));
        image.src = src;
      });
    }

    function preloadAudio(src, options) {
      return new Promise((resolve, reject) => {
        const audio = new Audio();
        const tune = Object.assign({ loop: false, volume: 1 }, options || {});

        function cleanup() {
          audio.removeEventListener('canplaythrough', handleReady);
          audio.removeEventListener('error', handleError);
        }

        function handleReady() {
          cleanup();
          resolve(audio);
        }

        function handleError() {
          cleanup();
          reject(new Error('Failed to load audio: ' + src));
        }

        audio.preload = 'auto';
        audio.loop = tune.loop;
        audio.volume = tune.volume;
        audio.addEventListener('canplaythrough', handleReady);
        audio.addEventListener('error', handleError);
        audio.src = src;
        audio.load();

        if (audio.readyState >= 4) {
          handleReady();
        }
      });
    }

    function preloadWitchFonts() {
      if (!document.fonts || typeof document.fonts.load !== 'function') {
        return Promise.resolve();
      }

      return Promise.all([
        document.fonts.load('1em WitchRunes'),
        document.fonts.load('700 1em Songti SC')
      ]);
    }
  });
